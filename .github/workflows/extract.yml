          "https://testbook.com/kvs/test-series/my",
          "https://testbook.com/nvs/test-series/my",
          "https://testbook.com/dsssb/test-series/my",
          "https://testbook.com/mp-tet/test-series/my",
          "https://testbook.com/bihar-stet/test-series/my",
          "https://testbook.com/up-tgt/test-series/my",
          "https://testbook.com/up-pgt/test-series/my",

          # 🔧 ENGINEERING / TECHNICAL EXAMS
          "https://testbook.com/dfccil/test-series/my",
          "https://testbook.com/navy-tradesman-mate/test-series/my",

          # 🕵️ INTELLIGENCE / IB EXAMS
          "https://testbook.com/ib-acio/test-series/my",
          "https://testbook.com/ib-mts/test-series/my",
          "https://testbook.com/ib-security-assistant/test-series/my"
        ]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Extraction Engine
        env:
          SERIES_LINK: ${{ matrix.series_link }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python bot.py
