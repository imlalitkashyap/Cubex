          "https://testbook.com/uk-police-constable/test-series/my",
          "https://testbook.com/jkssb-police/test-series/my",

          # 🪖 ARMY / DEFENCE / PARAMILITARY EXAMS
          "https://testbook.com/indian-army-gd-agniveer/test-series/my",
          "https://testbook.com/army-technical-agniveer/test-series/my",
          "https://testbook.com/army-clerk-agniveer/test-series/my",
          "https://testbook.com/navy-ssr-agniveer/test-series/my",
